# =============================================================
# Eclipse Mosquitto — LED Dashboard
# =============================================================

# Persistencia de mensajes retenidos (status, online)
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type warning
log_type error
log_type notice

# ----- Listener MQTT (TCP) -----
# El firmware ESP32 se conecta aqui
listener 1883
protocol mqtt

# ----- Listener WebSocket -----
# El dashboard web se conecta via nginx proxy
listener 9001
protocol websockets

# Acceso anonimo (sin usuario/password)
# Para produccion: cambiar a false y configurar password_file
allow_anonymous true
